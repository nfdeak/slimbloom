<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>YouTube Banner 2048x1152 — Lazy Weight Loss</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #1a1a1a;
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
  }

  .toolbar {
    background: #111;
    color: #fff;
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .toolbar .info { opacity: 0.8; }
  .toolbar-actions { display: flex; gap: 10px; }
  .toolbar button {
    background: #C07A5C;
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .toolbar button:hover { background: #a8654a; }
  .toolbar button.secondary { background: #333; }
  .toolbar button.secondary:hover { background: #444; }

  .preview-wrap {
    padding: 40px;
    display: flex;
    justify-content: center;
  }
  .preview-wrap .scale-note {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(0,0,0,0.8);
    color: #fff;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 11px;
  }

  /* Exact YouTube banner dimensions — DO NOT CHANGE */
  .banner {
    width: 2048px;
    height: 1152px;
    position: relative;
    background: linear-gradient(135deg, #F5EEE6 0%, #FDF0E8 50%, #F5EEE6 100%);
    overflow: hidden;
    flex-shrink: 0;
    transform-origin: top center;
  }

  /* Background decorative circles */
  .bg-circle {
    position: absolute;
    border-radius: 50%;
  }
  .bg-circle.c1 { width: 800px; height: 800px; top: -200px; left: -200px; background: rgba(192, 122, 92, 0.08); }
  .bg-circle.c2 { width: 600px; height: 600px; bottom: -150px; right: -100px; background: rgba(192, 122, 92, 0.1); }
  .bg-circle.c3 { width: 300px; height: 300px; top: 100px; right: 200px; background: rgba(76, 175, 80, 0.06); }
  .bg-circle.c4 { width: 200px; height: 200px; bottom: 200px; left: 300px; background: rgba(192, 122, 92, 0.12); }

  /* Safe zone — center 1546×423 is visible on ALL devices */
  .safe-zone {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 1546px;
    height: 423px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 60px;
  }

  .content { width: 100%; display: flex; flex-direction: column; align-items: center; }

  .brand {
    font-size: 38px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 16px;
    color: #2D2A26;
  }
  .brand span { color: #C07A5C; }

  .headline {
    font-size: 120px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -3px;
    color: #2D2A26;
    margin-bottom: 28px;
    text-align: center;
  }
  .headline .accent { color: #C07A5C; }

  .subheadline {
    font-size: 28px;
    font-weight: 500;
    color: #5A4E45;
    line-height: 1.3;
    margin-bottom: 28px;
    text-align: center;
  }

  .cta-row {
    display: flex;
    align-items: center;
    gap: 24px;
    justify-content: center;
  }
  .cta-pill {
    background: #C07A5C;
    color: #fff;
    padding: 18px 36px;
    border-radius: 100px;
    font-size: 24px;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 8px 24px rgba(192, 122, 92, 0.3);
  }
  .social-proof {
    font-size: 18px;
    color: #8A8279;
    font-weight: 600;
  }
  .social-proof .stars {
    color: #F5A623;
    letter-spacing: 2px;
    font-size: 20px;
    margin-right: 6px;
  }

  /* Right visual — stat cards */
  .visual {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 380px;
  }
  .stat-card {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    padding: 22px 26px;
    border-radius: 20px;
    border: 1px solid rgba(192, 122, 92, 0.15);
    box-shadow: 0 8px 32px rgba(0,0,0,0.04);
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .stat-icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: linear-gradient(135deg, #FFE4D6, #FFC9B0);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    flex-shrink: 0;
  }
  .stat-info .value {
    font-size: 32px;
    font-weight: 800;
    color: #2D2A26;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-info .label {
    font-size: 16px;
    color: #8A8279;
    font-weight: 500;
  }
  .stat-card.green .stat-icon { background: linear-gradient(135deg, #E8F5E9, #C8E6C9); }
  .stat-card.green .stat-info .value { color: #2E7D32; }
  .stat-card.blue .stat-icon { background: linear-gradient(135deg, #E3F2FD, #BBDEFB); }
  .stat-card.blue .stat-info .value { color: #1565C0; }

  .floating-emoji {
    position: absolute;
    font-size: 64px;
    opacity: 0.2;
  }
  .e1 { top: 180px; right: 80px; transform: rotate(-15deg); }
  .e2 { bottom: 180px; left: 100px; transform: rotate(20deg); }
  .e3 { top: 120px; left: 500px; transform: rotate(8deg); opacity: 0.15; }

  .safe-zone-outline {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 1546px;
    height: 423px;
    border: 3px dashed rgba(255, 0, 100, 0.4);
    pointer-events: none;
    display: none;
  }
  .safe-zone-outline.visible { display: block; }
</style>
</head>
<body>

<div class="toolbar">
  <div class="info">
    <strong>YouTube Banner</strong> &bull; 2048 × 1152 px &bull; Safe zone: center 1546×423
  </div>
  <div class="toolbar-actions">
    <button class="secondary" onclick="toggleSafeZone()">Toggle safe zone</button>
    <button onclick="setScale(0.35)">35%</button>
    <button onclick="setScale(0.5)">50%</button>
    <button onclick="setScale(0.75)">75%</button>
    <button onclick="setScale(1)">100% (full size)</button>
  </div>
</div>

<div class="preview-wrap" id="previewWrap">
  <div class="banner" id="banner">

    <div class="safe-zone">
      <div class="content">
        <h1 class="headline">
          Lose Weight<br>
          the <span class="accent">Lazy Way.</span>
        </h1>
        <p class="subheadline">
          10 minutes a day. No gym. No stress.
        </p>
        <div class="cta-row">
          <div class="cta-pill">Take the 60-sec Quiz &#10095;</div>
          <div class="social-proof">
            <span class="stars">&#9733;&#9733;&#9733;&#9733;&#9733;</span>1,000+ women
          </div>
        </div>
      </div>
    </div>

    <div class="safe-zone-outline" id="safeZoneOutline"></div>
  </div>
</div>

<div class="scale-note" id="scaleNote">Preview at 35%</div>

<script>
  function setScale(scale) {
    var banner = document.getElementById('banner');
    var note = document.getElementById('scaleNote');
    banner.style.transform = 'scale(' + scale + ')';
    // Adjust wrap so the scaled banner takes correct space
    var wrap = document.getElementById('previewWrap');
    wrap.style.height = (1152 * scale + 80) + 'px';
    wrap.style.width = (2048 * scale + 80) + 'px';
    wrap.style.margin = '0 auto';
    note.textContent = 'Preview at ' + Math.round(scale * 100) + '%';
  }

  function toggleSafeZone() {
    document.getElementById('safeZoneOutline').classList.toggle('visible');
  }

  // Start at 35% so it fits on screen
  setScale(0.35);
</script>

</body>
</html>
