// ===== AUTH =====
function attemptLogin() {
  var email = document.getElementById('email-input').value.trim();
  var password = document.getElementById('password-input').value;
  var errorEl = document.getElementById('login-error');
  var btn = document.getElementById('login-btn');

  if (!email || !password) {
    errorEl.textContent = 'Please enter email and password.';
    errorEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in…';
  errorEl.style.display = 'none';

  _sb.auth.signInWithPassword({ email: email, password: password })
    .then(function(result) {
      if (result.error) {
        errorEl.textContent = result.error.message || 'Login failed. Check your credentials.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
      }
      _adminSession = result.data.session;
      document.getElementById('login-gate').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      loadAndRender();
    })
    .catch(function(err) {
      errorEl.textContent = 'Login failed: ' + err.message;
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    });
}

function doLogout() {
  _sb.auth.signOut().then(function() {
    _adminSession = null;
    location.reload();
  });
}

// ===== DATA LOADING (from workout-data.json) =====
function loadCurrentData(cb) {
  // Default to DEFAULTS
  currentData.schedule = JSON.parse(JSON.stringify(DEFAULTS.schedule));
  currentData.library = JSON.parse(JSON.stringify(DEFAULTS.library));
  currentData.exerciseDb = JSON.parse(JSON.stringify(DEFAULTS.exerciseDb));

  fetch('workout-data.json?v=' + Date.now())
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(data) {
      if (data) {
        if (data.schedule) currentData.schedule = data.schedule;
        if (data.library) currentData.library = data.library;
        if (data.exerciseDb) currentData.exerciseDb = data.exerciseDb;
      }
      if (cb) cb();
    })
    .catch(function() { if (cb) cb(); });
}

async function uploadLibThumbnail(idx, fileInput) {
  var file = fileInput.files[0];
  if (!file) return;

  var btn = document.getElementById('lib-upload-btn-' + idx);
  var origText = btn.textContent;
  btn.textContent = 'Uploading…';
  btn.disabled = true;
  btn.classList.add('uploading');

  try {
    // Create a unique filename
    var ext = file.name.split('.').pop().toLowerCase();
    var safeName = currentData.library[idx].title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/,'');
    var fileName = safeName + '-' + Date.now() + '.' + ext;

    // Upload to Supabase Storage
    var { data, error } = await _sb.storage
      .from(STORAGE_BUCKET)
      .upload(fileName, file, {
        cacheControl: '3600',
        upsert: true,
        contentType: file.type
      });

    if (error) throw error;

    // Get the public URL
    var { data: urlData } = _sb.storage
      .from(STORAGE_BUCKET)
      .getPublicUrl(fileName);

    var publicUrl = urlData.publicUrl;

    // Update the data and UI
    currentData.library[idx].imageUrl = publicUrl;
    var inputEl = document.getElementById('lib-img-input-' + idx);
    if (inputEl) inputEl.value = publicUrl;
    updateLibImgPreview(idx, publicUrl);

    btn.textContent = 'Uploaded ✓';
    setTimeout(function() {
      btn.textContent = 'Change Image';
      btn.disabled = false;
      btn.classList.remove('uploading');
    }, 1500);

    showToast('Image uploaded!');
  } catch (err) {
    btn.textContent = origText;
    btn.disabled = false;
    btn.classList.remove('uploading');
    showToast('Upload failed: ' + (err.message || err));
  }

  // Reset file input
  fileInput.value = '';
}

// ===== VIDEO URL VALIDATION =====
function parseVideoUrl(url) {
  if (!url) return null;
  // Direct video file (MP4, WebM, Cloudinary, etc.)
  if (/\.(mp4|webm|mov|m3u8)(\?|$)/i.test(url) || /res\.cloudinary\.com/i.test(url)) {
    return { type: 'direct', url: url };
  }
  var ytMatch = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([\w-]{11})/);
  if (ytMatch) return { type: 'youtube', id: ytMatch[1] };
  var viMatch = url.match(/(?:vimeo\.com\/|player\.vimeo\.com\/video\/)(\d+)/);
  if (viMatch) return { type: 'vimeo', id: viMatch[1] };
  return null;
}

function videoStatusIcon(url) {
  if (!url) return '';
  return parseVideoUrl(url) ? '<span style="color:#22c55e">&#10003;</span>' : '<span style="color:#dc2626">&#10007;</span>';
}

function validateVideoInput(el) {
  var idx = el.getAttribute('data-ex');
  var statusEl = document.getElementById('vid-status-' + idx);
  if (statusEl) statusEl.innerHTML = videoStatusIcon(el.value);
}

      'Content-Type': 'application/json'
    },
    body: JSON.stringify(payload)
  })
  .then(function(r) { return r.json().then(function(data) { return { ok: r.ok, data: data }; }); })
  .then(function(result) {
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save All Changes';
    if (result.ok) {
      showToast('✅ Saved & published!');
      renderSchedule();
    } else {
      showToast('❌ Save failed: ' + (result.data.error || 'Unknown error'));
    }
  })
  .catch(function(err) {
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save All Changes';
    showToast('❌ Save failed: ' + err.message);
  });
}

function resetToDefaults() {
  if (confirm('Reset all content to defaults? This removes all your changes and publishes defaults.')) {
    currentData.schedule = JSON.parse(JSON.stringify(DEFAULTS.schedule));
    currentData.library = JSON.parse(JSON.stringify(DEFAULTS.library));
    currentData.exerciseDb = JSON.parse(JSON.stringify(DEFAULTS.exerciseDb));
    renderAll();
    saveAllChanges();
  }
}

// ===== TOAST =====
function showToast(msg) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 2200);
}

// ===== INIT =====
function renderAll() {
  renderSchedule();
  renderLibrary();
  renderCategoryChips();
  renderExercises();
}

function loadAndRender() {
  loadCurrentData(function() {
    renderAll();
  });
}

// Check for existing Supabase session on load
_sb.auth.getSession().then(function(result) {
  if (result.data && result.data.session) {
    _adminSession = result.data.session;
    document.getElementById('login-gate').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    loadAndRender();
  }
});
</script>
</body>
</html>
